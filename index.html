<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>企業級進銷存 (多門市矩陣版)</title>
    <style>
        :root {
            --ios-bg: #F2F2F7; --ios-card: #FFFFFF; --ios-blue: #007AFF; 
            --ios-green: #34C759; --ios-red: #FF3B30; --ios-gray: #8E8E93; 
            --ios-light-gray: #E5E5EA; --text-main: #1C1C1E;
        }

        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg); color: var(--text-main);
            padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
            padding-top: env(safe-area-inset-top); -webkit-tap-highlight-color: transparent;
        }

        /* 頂部導覽列與門市切換 */
        .header {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; padding: 10px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.1); z-index: 50;
            display: flex; flex-direction: column; gap: 8px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 20px; font-weight: 700; }
        
        .store-selector {
            background: #E5F0FF; color: var(--ios-blue); border: none; padding: 6px 12px;
            border-radius: 8px; font-weight: 600; font-size: 16px; outline: none; appearance: none;
            text-align: center;
        }

        .container { padding: 15px; }
        .card { background: var(--ios-card); border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        /* 按鈕共用 */
        .btn-sm { background: var(--ios-blue); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;}
        .btn-full { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 18px; font-weight: 600; color: white; background: var(--ios-blue); cursor: pointer; margin-top: 10px;}
        .btn-danger { background: var(--ios-red); color: white;}

        /* --- 批次熱力矩陣 (Batch Matrix) --- */
        .batch-date-row { display: flex; align-items: center; justify-content: space-between; background: var(--ios-bg); padding: 10px; border-radius: 10px; margin-bottom: 15px;}
        .batch-date-row input { border: none; background: transparent; font-size: 16px; font-weight: bold; color: var(--ios-blue); outline: none; text-align: right;}
        
        .matrix-grid { display: grid; grid-template-columns: 3fr 1fr 1.5fr 1.5fr; gap: 5px; align-items: center; }
        .mat-header { font-size: 12px; color: var(--ios-gray); text-align: center; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid var(--ios-light-gray);}
        .mat-header:first-child { text-align: left; }
        
        .mat-row { display: contents; }
        .mat-cell { padding: 12px 0; border-bottom: 0.5px solid var(--ios-light-gray); font-size: 15px;}
        .mat-name { font-weight: 600; display: flex; flex-direction: column;}
        .mat-code { font-size: 11px; color: var(--ios-blue); }
        .mat-stock { text-align: center; font-weight: 700; color: var(--ios-gray);}
        
        /* 熱力矩陣輸入框 */
        .mat-input { 
            width: 100%; box-sizing: border-box; padding: 10px 4px; text-align: center; 
            font-size: 16px; font-weight: bold; border: 1px solid var(--ios-light-gray); 
            border-radius: 8px; outline: none; transition: background-color 0.3s;
        }
        .mat-input.in { color: #0056b3; }
        .mat-input.out { color: #b30000; }
        .mat-input::placeholder { font-weight: normal; color: #ccc; }

        /* 列表樣式 (主檔/總表使用) */
        .list-item { padding: 12px 0; border-bottom: 0.5px solid var(--ios-light-gray); display: flex; justify-content: space-between; align-items: center;}
        .list-item:last-child { border-bottom: none; }
        .list-meta { display: flex; flex-direction: column; gap: 4px; }
        .list-controls { display: flex; gap: 10px; }
        .btn-icon { background: none; border: none; font-size: 18px; color: var(--ios-gray); cursor: pointer; padding: 4px;}

        /* 總表樣式 */
        .log-action.in { color: var(--ios-blue); font-weight: bold; }
        .log-action.out { color: var(--ios-red); font-weight: bold; }

        /* 浮動 Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.2s;}
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--ios-card); width: 85%; max-width: 400px; border-radius: 14px; padding: 20px; box-sizing: border-box;}
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; text-align: center;}
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; color: var(--ios-gray); margin-bottom: 4px;}
        .input-group input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid var(--ios-light-gray); border-radius: 8px; font-size: 16px;}
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; border: none; font-size: 16px; cursor: pointer;}
        .btn-cancel { background: var(--ios-light-gray); color: var(--text-main); }

        /* 底部導覽列 (4 Tabs) */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding-top: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
            border-top: 0.5px solid rgba(0,0,0,0.1); z-index: 100;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--ios-gray); text-decoration: none; width: 25%;}
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 22px; margin-bottom: 4px; }
        .view-content { display: none; }
        .view-content.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <span class="page-title" id="header-title">門市庫存作業</span>
            <select class="store-selector" id="global-store-select" onchange="changeStore()"></select>
        </div>
    </div>

    <div class="container">
        
        <div id="view-operate" class="view-content active">
            <div class="card">
                <div class="card-title">批次進退貨矩陣 (熱力模式)</div>
                <div class="batch-date-row">
                    <span>📅 單據日期</span>
                    <input type="date" id="batch-date">
                </div>
                
                <div class="matrix-grid" id="matrix-container">
                    </div>

                <button class="btn-full" onclick="submitBatchMatrix()">📤 一鍵送出批次異動</button>
                <div style="font-size: 12px; color: var(--ios-gray); text-align: center; margin-top: 10px;">
                    輸入數量後背景顏色會加深，方便核對。
                </div>
            </div>
        </div>

        <div id="view-products" class="view-content">
            <div class="card">
                <div class="card-title">
                    商品管理
                    <button class="btn-sm" onclick="openProductModal()">+ 新增</button>
                </div>
                <div id="product-list-container"></div>
            </div>
        </div>

        <div id="view-stores" class="view-content">
            <div class="card">
                <div class="card-title">
                    門市據點管理
                    <button class="btn-sm" onclick="openStoreModal()">+ 新增</button>
                </div>
                <div id="store-list-container"></div>
            </div>
        </div>

        <div id="view-history" class="view-content">
            <div class="card">
                <div class="card-title">本日/歷史異動明細</div>
                <div id="history-list-container"></div>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="product-modal">
        <div class="modal-content">
            <div class="modal-title" id="pm-title">新增/編輯商品</div>
            <input type="hidden" id="pm-id">
            <div class="input-group"><label>代號</label><input type="text" id="pm-code" placeholder="如: A001"></div>
            <div class="input-group"><label>商品名稱</label><input type="text" id="pm-name"></div>
            <div class="input-group"><label>規格</label><input type="text" id="pm-spec" placeholder="如: 500g"></div>
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1"><label>批發價</label><input type="number" id="pm-cost"></div>
                <div class="input-group" style="flex:1"><label>零售價</label><input type="number" id="pm-price"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('product-modal')">取消</button>
                <button class="btn-sm" style="flex:1" onclick="saveProduct()">儲存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="store-modal">
        <div class="modal-content">
            <div class="modal-title" id="sm-title">新增/編輯門市</div>
            <input type="hidden" id="sm-id">
            <div class="input-group"><label>門市代號</label><input type="text" id="sm-code" placeholder="如: S01"></div>
            <div class="input-group"><label>門市名稱</label><input type="text" id="sm-name" placeholder="如: 台北中山店"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('store-modal')">取消</button>
                <button class="btn-sm" style="flex:1" onclick="saveStore()">儲存</button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <a href="#" class="tab-item active" onclick="switchTab('operate', '門市庫存作業', this)">
            <div class="tab-icon">📦</div>庫存
        </a>
        <a href="#" class="tab-item" onclick="switchTab('products', '商品主檔管理', this)">
            <div class="tab-icon">🏷️</div>商品
        </a>
        <a href="#" class="tab-item" onclick="switchTab('stores', '門市據點管理', this)">
            <div class="tab-icon">🏪</div>門市
        </a>
        <a href="#" class="tab-item" onclick="switchTab('history', '單店營運總表', this)">
            <div class="tab-icon">📋</div>總表
        </a>
    </div>

    <script>
        // --- 核心資料架構 (模擬 Firebase 結構) ---
        let stores = [
            { id: "S001", code: "S01", name: "台北旗艦店" },
            { id: "S002", code: "S02", name: "信義遠百店" },
            { id: "S003", code: "S03", name: "板橋總店" }
        ];
        
        // 預設當前門市
        let currentStoreId = "S001";

        // 商品資料：庫存(stock) 改為物件，紀錄每個門市的數量
        let products = [
            { id: "P001", code: "A001", name: "招牌生乳捲", spec: "500g", cost: 150, price: 250, stocks: {"S001": 12, "S002": 5, "S003": 0} },
            { id: "P002", code: "B001", name: "週末草莓塔", spec: "6吋", cost: 200, price: 350, stocks: {"S001": 5, "S002": 2, "S003": 8} },
            { id: "P003", code: "C001", name: "常態重乳酪", spec: "400g", cost: 180, price: 280, stocks: {"S001": 8, "S002": 10, "S003": 3} }
        ];

        // 歷史紀錄必須綁定 storeId
        let historyLogs = [
            { id: "L001", storeId: "S001", date: "2026-03-14", time: "09:00", productId: "P001", type: "IN", qty: 10 },
            { id: "L002", storeId: "S002", date: "2026-03-14", time: "10:30", productId: "P002", type: "OUT", qty: 2 }
        ];

        // 初始化日期
        document.getElementById('batch-date').valueAsDate = new Date();

        // --- 渲染引擎 ---
        function renderAll() {
            renderStoreSelector();
            renderBatchMatrix();
            renderProducts();
            renderStores();
            renderHistory();
        }

        // 渲染: 頂部門市切換器
        function renderStoreSelector() {
            const select = document.getElementById('global-store-select');
            select.innerHTML = stores.map(s => `<option value="${s.id}" ${s.id === currentStoreId ? 'selected' : ''}>${s.name}</option>`).join('');
        }

        // 變更門市
        function changeStore() {
            currentStoreId = document.getElementById('global-store-select').value;
            renderAll(); // 切換門市後，重新整理所有畫面 (庫存與總表會變)
        }

        // 1. 渲染: 批次熱力矩陣
        function renderBatchMatrix() {
            let html = `
                <div class="mat-header">品項</div>
                <div class="mat-header">現有</div>
                <div class="mat-header">進貨(+)</div>
                <div class="mat-header">退換(-)</div>
            `;
            
            products.forEach(p => {
                // 確保該門市有庫存屬性，沒有則預設為 0
                const currentStock = p.stocks[currentStoreId] || 0;
                
                html += `
                <div class="mat-row">
                    <div class="mat-cell mat-name"><span class="mat-code">${p.code}</span>${p.name}</div>
                    <div class="mat-cell mat-stock">${currentStock}</div>
                    <div class="mat-cell"><input type="number" class="mat-input in" data-type="in" data-pid="${p.id}" placeholder="0" min="0" oninput="updateHeatmap(this)"></div>
                    <div class="mat-cell"><input type="number" class="mat-input out" data-type="out" data-pid="${p.id}" placeholder="0" min="0" oninput="updateHeatmap(this)"></div>
                </div>
                `;
            });
            document.getElementById('matrix-container').innerHTML = html;
        }

        // 熱力矩陣顏色動態計算 (Heatmap UI)
        function updateHeatmap(input) {
            const val = parseInt(input.value) || 0;
            const isIN = input.dataset.type === 'in';
            
            if (val === 0 || input.value === '') {
                input.style.backgroundColor = 'transparent';
                input.style.color = '';
            } else {
                // 依據數量加深顏色 (以單次進退貨 50 為最大值計算透明度)
                let intensity = Math.min(val / 50, 1) * 0.4 + 0.1; // Alpha 介於 0.1 ~ 0.5
                if (isIN) {
                    input.style.backgroundColor = `rgba(0, 122, 255, ${intensity})`; // 藍色
                    input.style.color = '#003a8c';
                } else {
                    input.style.backgroundColor = `rgba(255, 59, 48, ${intensity})`; // 紅色
                    input.style.color = '#a80000';
                }
            }
        }

        // 2. 渲染: 商品主檔清單
        function renderProducts() {
            const html = products.map(p => `
                <div class="list-item">
                    <div class="list-meta">
                        <span class="mat-code">${p.code}</span>
                        <span style="font-weight:600; font-size:16px;">${p.name}</span>
                        <span style="font-size:12px; color:var(--ios-gray)">售價: $${p.price} | 規格: ${p.spec}</span>
                    </div>
                    <div class="list-controls">
                        <button class="btn-icon" onclick="openProductModal('${p.id}')">✏️</button>
                        <button class="btn-icon" onclick="deleteProduct('${p.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('product-list-container').innerHTML = html;
        }

        // 3. 渲染: 門市主檔清單
        function renderStores() {
            const html = stores.map(s => `
                <div class="list-item">
                    <div class="list-meta">
                        <span class="mat-code">${s.code}</span>
                        <span style="font-weight:600; font-size:16px;">${s.name}</span>
                    </div>
                    <div class="list-controls">
                        <button class="btn-icon" onclick="openStoreModal('${s.id}')">✏️</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('store-list-container').innerHTML = html;
        }

        // 4. 渲染: 當前門市的總表
        function renderHistory() {
            // 過濾出目前門市的紀錄
            const storeLogs = historyLogs.filter(l => l.storeId === currentStoreId).reverse();
            
            if(storeLogs.length === 0) {
                document.getElementById('history-list-container').innerHTML = "<div style='text-align:center; padding:20px; color:var(--ios-gray);'>本門市暫無異動紀錄</div>";
                return;
            }

            const html = storeLogs.map(log => {
                const product = products.find(p => p.id === log.productId) || { name: "未知商品", code: "???" };
                let actionSpan = log.type === 'IN' ? `<span class="log-action in">+ 補入 ${log.qty}</span>` : `<span class="log-action out">- 退換 ${log.qty}</span>`;

                return `
                <div class="list-item" style="align-items:flex-start;">
                    <div class="list-meta" style="flex:1;">
                        <span style="font-size:12px; color:var(--ios-gray)">${log.date} ${log.time}</span>
                        <span style="font-weight:600;">${product.name} <span class="mat-code">${product.code}</span></span>
                    </div>
                    <div>${actionSpan}</div>
                </div>
                `;
            }).join('');
            document.getElementById('history-list-container').innerHTML = html;
        }


        // --- 業務操作邏輯 (Actions) ---

        // 執行批次進退貨 (Matrix Submit)
        function submitBatchMatrix() {
            const dateStr = document.getElementById('batch-date').value;
            if(!dateStr) { alert("請選擇單據日期！"); return; }
            
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            const inputs = document.querySelectorAll('.mat-input');
            let hasAction = false;

            inputs.forEach(input => {
                const qty = parseInt(input.value);
                if(qty > 0) {
                    hasAction = true;
                    const pid = input.dataset.pid;
                    const type = input.dataset.type === 'in' ? 'IN' : 'OUT';
                    const product = products.find(p => p.id === pid);
                    
                    // 初始化該門市庫存(若無)
                    if(product.stocks[currentStoreId] === undefined) product.stocks[currentStoreId] = 0;

                    // 檢查退貨是否超出庫存
                    if(type === 'OUT' && product.stocks[currentStoreId] < qty) {
                        alert(`【${product.name}】 退貨數量(${qty}) 大於現有庫存(${product.stocks[currentStoreId]})，請重新確認！`);
                        input.value = product.stocks[currentStoreId]; // 幫防呆修正
                        return; // 中斷這筆
                    }

                    // 寫入庫存
                    if(type === 'IN') product.stocks[currentStoreId] += qty;
                    else product.stocks[currentStoreId] -= qty;

                    // 寫入紀錄
                    historyLogs.push({
                        id: "L" + Date.now() + Math.floor(Math.random()*100),
                        storeId: currentStoreId,
                        date: dateStr,
                        time: timeStr,
                        productId: pid,
                        type: type,
                        qty: qty
                    });
                }
            });

            if(hasAction) {
                alert("批次異動已成功送出！庫存已更新。");
                if (navigator.vibrate) navigator.vibrate([30, 50, 30]); // 成功震動
                renderAll(); // 重新渲染畫面清空輸入框
            } else {
                alert("請在矩陣中輸入要進退貨的數量。");
            }
        }

        // --- 商品主檔 CRUD ---
        function openProductModal(id = null) {
            if(id) {
                const p = products.find(x => x.id === id);
                document.getElementById('pm-title').innerText = "編輯商品";
                document.getElementById('pm-id').value = p.id;
                document.getElementById('pm-code').value = p.code;
                document.getElementById('pm-name').value = p.name;
                document.getElementById('pm-spec').value = p.spec;
                document.getElementById('pm-cost').value = p.cost;
                document.getElementById('pm-price').value = p.price;
            } else {
                document.getElementById('pm-title').innerText = "新增商品";
                document.getElementById('pm-id').value = "";
                ['code', 'name', 'spec', 'cost', 'price'].forEach(f => document.getElementById(`pm-${f}`).value = "");
            }
            document.getElementById('product-modal').classList.add('active');
        }

        function saveProduct() {
            const id = document.getElementById('pm-id').value;
            const payload = {
                code: document.getElementById('pm-code').value,
                name: document.getElementById('pm-name').value,
                spec: document.getElementById('pm-spec').value,
                cost: parseInt(document.getElementById('pm-cost').value) || 0,
                price: parseInt(document.getElementById('pm-price').value) || 0
            };

            if(!payload.name || !payload.code) { alert("請填寫代號與名稱"); return; }

            if(id) {
                // 更新
                const idx = products.findIndex(x => x.id === id);
                products[idx] = { ...products[idx], ...payload };
            } else {
                // 新增
                payload.id = "P" + Date.now();
                payload.stocks = {}; // 新商品庫存預設為空
                products.push(payload);
            }
            closeModal('product-modal');
            renderAll();
        }

        function deleteProduct(id) {
            if(confirm("確定刪除此商品？(相關歷史紀錄將不受影響)")) {
                products = products.filter(x => x.id !== id);
                renderAll();
            }
        }

        // --- 門市主檔 CRUD ---
        function openStoreModal(id = null) {
            if(id) {
                const s = stores.find(x => x.id === id);
                document.getElementById('sm-title').innerText = "編輯門市";
                document.getElementById('sm-id').value = s.id;
                document.getElementById('sm-code').value = s.code;
                document.getElementById('sm-name').value = s.name;
            } else {
                document.getElementById('sm-title').innerText = "新增門市";
                document.getElementById('sm-id').value = "";
                document.getElementById('sm-code').value = "";
                document.getElementById('sm-name').value = "";
            }
            document.getElementById('store-modal').classList.add('active');
        }

        function saveStore() {
            const id = document.getElementById('sm-id').value;
            const payload = {
                code: document.getElementById('sm-code').value,
                name: document.getElementById('sm-name').value
            };
            if(!payload.name) { alert("請填寫門市名稱"); return; }

            if(id) {
                const idx = stores.findIndex(x => x.id === id);
                stores[idx] = { ...stores[idx], ...payload };
            } else {
                payload.id = "S" + Date.now();
                stores.push(payload);
            }
            closeModal('store-modal');
            renderAll();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // --- UI 切換邏輯 ---
        function switchTab(viewId, title, element) {
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('header-title').innerText = title;
            document.querySelectorAll('.view-content').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
        }

        // 系統啟動
        renderAll();

    </script>
</body>
</html>
